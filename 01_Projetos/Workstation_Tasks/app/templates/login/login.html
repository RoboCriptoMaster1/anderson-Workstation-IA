{% extends "base.html" %}

{% block title %}
Login | Workstation Tasks
{% endblock %}

{% block content %}

<div class="card">

    <h2>🔐 Login</h2>

    <form method="POST">

        <div class="form-group">

            <label>E-mail</label>

            <input
                type="email"
                name="email"
                class="form-control"
                required
            >

        </div>

        <div class="form-group">

            <label>Senha</label>

            <input
                type="password"
                name="password"
                class="form-control"
                required
            >

        </div>

        <br>

        <button
            class="btn btn-primary"
            type="submit">

            Entrar

        </button>

    </form>

</div>

{% endblock %}
